apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-pdb-for-multireplica
spec:
  steps:
    - name: install-policy-set-enforce
      try:
        - apply:
            file: ../../../policies/resource-governance/policies.yaml
        - patch:
            resource:
              apiVersion: kyverno.io/v1
              kind: ClusterPolicy
              metadata:
                name: require-pdb-for-multireplica
              spec:
                validationFailureAction: Enforce
        - assert:
            resource:
              apiVersion: kyverno.io/v1
              kind: ClusterPolicy
              metadata:
                name: require-pdb-for-multireplica
              status:
                conditions:
                  - reason: Succeeded
                    status: "True"
                    type: Ready
    - name: bad-multireplica-without-pdb-denied
      try:
        - apply:
            file: bad-deployment.yaml
            expect:
              - check:
                  ($error != null): true
    - name: good-multireplica-with-pdb-allowed
      try:
        - apply:
            file: pdb.yaml
        - apply:
            file: good-deployment.yaml
