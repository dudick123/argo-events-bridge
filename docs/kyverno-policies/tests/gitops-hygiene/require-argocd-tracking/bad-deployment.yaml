apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-deploy
  labels:
    platform.example.com/tenant: sample-tenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-deploy
  template:
    metadata:
      labels:
        app: bad-deploy
    spec:
      containers:
        - name: app
          image: platformacr.azurecr.io/sample:1.0.0
