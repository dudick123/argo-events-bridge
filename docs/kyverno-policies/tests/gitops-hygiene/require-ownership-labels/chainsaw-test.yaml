apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-ownership-labels
spec:
  steps:
    - name: install-policy-set-enforce
      try:
        - apply:
            file: ../../../policies/gitops-hygiene/policies.yaml
        - patch:
            resource:
              apiVersion: kyverno.io/v1
              kind: ClusterPolicy
              metadata:
                name: require-ownership-labels
              spec:
                validationFailureAction: Enforce
        - assert:
            resource:
              apiVersion: kyverno.io/v1
              kind: ClusterPolicy
              metadata:
                name: require-ownership-labels
              status:
                conditions:
                  - reason: Succeeded
                    status: "True"
                    type: Ready
    - name: verify-policy-behavior
      try:
        - apply:
            file: good-deployment.yaml
        - apply:
            file: bad-deployment.yaml
            expect:
              - check:
                  ($error != null): true
